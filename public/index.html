<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ParkiApp – Iniciando experiencia…</title>

  <!-- Fallback meta‑refresh por accesibilidad -->
  <meta http-equiv="refresh" content="6; URL=/login">
  <meta name="theme-color" content="#531975">

  <!-- Tipografía principal -->
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- Tailwind (modo CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{
      --parkia-primary:#531975;
      --parkia-secondary:#731176;
      --parkia-light:#D5CAE2;
    }
    body{
      font-family:'Raleway',sans-serif;
      height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(circle at 20% 30%,var(--parkia-secondary) 0%,var(--parkia-primary) 45%,#2a0d40 100%);
      color:#FFFFFF;
      overflow:hidden;
    }
    /* Pulso luminoso del logo */
    .pulse{animation:pulseGlow 3.6s ease-in-out infinite;}
    @keyframes pulseGlow{
      0%,100%{transform:scale(1);filter:drop-shadow(0 0 0px var(--parkia-light));}
      50%{transform:scale(1.06);filter:drop-shadow(0 0 22px var(--parkia-light));}
    }
    /* Loader giro */
    .loader{
      width:72px;height:72px;
      border:5px solid rgba(255,255,255,.25);
      border-top-color:var(--parkia-light);
      border-radius:50%;
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>

  <script>
    // Redirección suave tras animación
    window.addEventListener('load',()=>{
      // 4.5 s permite 1,25 ciclos completos de pulso + spinner
      setTimeout(()=>window.location.assign('/login'),4500);
    });
  </script>
</head>
<body>
  <div class="text-center space-y-6 select-none">
    <!-- Logo principal -->
    <!-- Asegúrate de que la ruta sea correcta en producción -->
    <img src="images/parkiapplogo.png" alt="ParkiApp" class="w-24 h-24 mx-auto pulse"/>
    <p class="text-xl sm:text-2xl font-semibold tracking-wide">Bienvenido a&nbsp;ParkiApp</p>
    <div class="loader mx-auto"></div>
    <p class="text-sm opacity-80">Redirigiendo a tu experiencia segura…</p>
    <noscript>
      <p class="mt-6 text-base font-medium">
        JavaScript está deshabilitado. <a href="/login" class="underline font-semibold">Haz clic aquí para continuar</a>
      </p>
    </noscript>
  </div>
</body>
</html>
